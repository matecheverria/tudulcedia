<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Inventario Supabase | Tu Dulce Día</title><style>:root{--bg:#fff8ec;--card:#fffdf8;--line:#ead8bd;--text:#563820;--muted:#7d5b3f;--acc:#b8653b;--ok:#48663f;--bad:#9f3d31;--info:#315d88;--warn:#8f492b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg),#f3e4cb);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1400px,calc(100% - 24px));margin:auto;padding:22px 0 70px}.card{background:#ffffffdd;border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 14px 34px #56382022}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(1.8rem,4vw,2.6rem)}.muted{color:var(--muted);font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}a,button{border:0;border-radius:999px;padding:9px 12px;text-decoration:none;font-weight:950;cursor:pointer;font:inherit;display:inline-flex;align-items:center;justify-content:center}.primary{background:var(--acc);color:#fff}.secondary{background:#f1dfc8;color:var(--text)}.green{background:var(--ok);color:#fff}.grid{display:grid;gap:10px}.kpis{grid-template-columns:repeat(4,1fr)}.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px}.kpi strong{display:block;font-size:1.45rem}.kpi span{font-size:.82rem;color:var(--muted);font-weight:950}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button.active{background:var(--acc);color:#fff}.scroll{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fffdf8}table{width:100%;border-collapse:collapse;min-width:900px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top;font-size:.86rem}th{position:sticky;top:0;background:#f4dfc4;text-transform:uppercase;font-size:.72rem;z-index:1}.msg{border-radius:14px;padding:12px;font-weight:900}.err{background:#fff0ed;color:var(--bad);border:1px solid #f1c1b8}.good{background:#eaf7ed;color:var(--ok);border:1px solid #bfe7ca}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:.76rem;font-weight:950;background:#f1dfc8}.badpill{background:#fde7e2;color:var(--bad)}.okpill{background:#e9f4e6;color:var(--ok)}@media(max-width:900px){.top{display:block}.kpis{grid-template-columns:1fr 1fr}.actions a,.actions button{width:100%;margin-top:6px}}@media(max-width:560px){.kpis{grid-template-columns:1fr}.wrap{width:calc(100% - 14px)}}</style></head><body><main class="wrap"><section class="card top"><div><h1>Inventario, costos y márgenes</h1><p class="muted">Panel Supabase mínimo viable. Sheets queda como respaldo temporal.</p></div><div class="actions"><a class="secondary" href="panel-td-privado-2026.html">Panel privado</a><a class="secondary" href="admin-inventario.html">Inventario Sheets respaldo</a><button class="primary" id="reload">Refrescar</button></div></section><section class="grid kpis" id="kpis"></section><section class="card"><div class="tabs"><button class="active" data-tab="margenes">Margen por pedido</button><button data-tab="recetas">Costos recetas</button><button data-tab="insumos">Costos insumos</button></div><div id="status" class="msg good" style="margin-top:12px">Cargando datos...</div><div class="scroll" style="margin-top:12px"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section></main><script>const SUPABASE_URL='https://uhwaybppsyibiwvqyglr.supabase.co';const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});let KEY='',tab='margenes',data={margenes:[],recetas:[],insumos:[]};function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function num(v){return Number(v)||0}function pct(v){return v==null?'—':Number(v).toFixed(1)+'%'}function setMsg(t,b=false){$('#status').className='msg '+(b?'err':'good');$('#status').textContent=t}async function loadKey(){if(KEY)return KEY;const html=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());const m=html.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!m)throw Error('No se pudo leer anon key');KEY=m[1];return KEY}async function api(path){const key=await loadKey();const r=await fetch(SUPABASE_URL+path,{headers:{apikey:key,Authorization:'Bearer '+key,'Content-Type':'application/json'}});const txt=await r.text();let json=null;try{json=txt?JSON.parse(txt):null}catch(e){json=txt}if(!r.ok)throw Error((json&&json.message)||txt||'Error Supabase');return json}async function load(){setMsg('Cargando datos desde Supabase...');try{const [m,r,i]=await Promise.all([api('/rest/v1/v_margen_pedidos?select=*&order=fecha_solicitada.desc&limit=200'),api('/rest/v1/v_costo_recetas?select=*&order=producto_nombre.asc'),api('/rest/v1/v_costo_unitario_insumos?select=*&order=insumo.asc')]);data={margenes:m||[],recetas:r||[],insumos:i||[]};setMsg('OK: datos cargados desde Supabase.');render()}catch(e){setMsg('Error: '+(e.message||e),true)}}function renderKpis(){const m=data.margenes,totalVenta=m.reduce((s,x)=>s+num(x.venta),0),totalCosto=m.reduce((s,x)=>s+num(x.costo_estimado),0),pend=m.filter(x=>num(x.items_sin_receta)||num(x.items_con_costo_pendiente)).length;$('#kpis').innerHTML=`<div class="kpi"><strong>${m.length}</strong><span>Pedidos con margen</span></div><div class="kpi"><strong>${money.format(totalVenta)}</strong><span>Venta activa</span></div><div class="kpi"><strong>${money.format(totalCosto)}</strong><span>Costo estimado</span></div><div class="kpi"><strong>${pend}</strong><span>Con datos pendientes</span></div>`}function render(){renderKpis();const h=$('#thead'),b=$('#tbody');if(tab==='margenes'){h.innerHTML='<tr><th>Folio</th><th>Cliente</th><th>Venta</th><th>Costo estima.</th><th>Margen</th><th>Margen %</th><th>Detalle</th><th>Estado dato</th></tr>';b.innerHTML=data.margenes.length?data.margenes.map(x=>{const pend=num(x.items_sin_receta)||num(x.items_con_costo_pendiente);return `<tr><td><strong>${esc(x.folio)}</strong><br>${esc(x.fecha_solicitada)}</td><td>${esc(x.cliente_nombre)}</td><td>${money.format(num(x.venta))}</td><td>${money.format(num(x.costo_estimado))}</td><td><strong>${money.format(num(x.margen))}</strong></td><td>${pct(x.margen_pct)}</td><td>${esc(x.detalle||'')}</td><td>${pend?'<span class="pill badpill">Pendiente receta/costo</span>':'<span class="pill okpill">OK</span>'}</td></tr>`}).join(''):'<tr><td colspan="8">Sin márgenes calculados.</td></tr>'}else if(tab==='recetas'){h.innerHTML='<tr><th>Producto</th><th>Rendimiento</th><th>Costo receta</th><th>Costo unitario</th><th>Ingredientes</th><th>Estado</th></tr>';b.innerHTML=data.recetas.length?data.recetas.map(x=>`<tr><td><strong>${esc(x.producto_nombre)}</strong></td><td>${esc(x.rendimiento)} ${esc(x.unidad_salida)}</td><td>${money.format(num(x.costo_receta))}</td><td>${money.format(num(x.costo_unitario_estimado))}</td><td>${esc(x.ingredientes)}</td><td>${num(x.ingredientes_sin_costo)?'<span class="pill badpill">Falta costo</span>':'<span class="pill okpill">OK</span>'}</td></tr>`).join(''):'<tr><td colspan="6">Sin recetas.</td></tr>'}else{h.innerHTML='<tr><th>Insumo</th><th>Unidad</th><th>Costo unitario</th><th>Cantidad comprada</th><th>Total compras</th></tr>';b.innerHTML=data.insumos.length?data.insumos.map(x=>`<tr><td><strong>${esc(x.insumo)}</strong></td><td>${esc(x.unidad_base)}</td><td>${x.costo_unitario_base==null?'—':money.format(Number(x.costo_unitario_base))}</td><td>${esc(x.cantidad_comprada)}</td><td>${money.format(num(x.costo_total_compras))}</td></tr>`).join(''):'<tr><td colspan="5">Sin insumos.</td></tr>'}}$$('[data-tab]').forEach(btn=>btn.onclick=()=>{tab=btn.dataset.tab;$$('[data-tab]').forEach(b=>b.classList.toggle('active',b===btn));render()});$('#reload').onclick=load;load();</script></body></html>
