<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tu Dulce Día | Catálogo</title>
  <meta name="description" content="Catálogo de Tu Dulce Día para pedidos de galletas artesanales y pan de masa madre.">
  <style>
    html,body{margin:0;width:100%;height:100%;background:#fff8ec}iframe{width:100%;height:100vh;border:0;display:block}.fallback{display:none;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#fff8ec;color:#563820;min-height:100vh;place-items:center;padding:24px}.card{max-width:560px;background:#fffdf8;border:1px solid #ead8bd;border-radius:24px;padding:24px;box-shadow:0 14px 34px #56382022;text-align:center}a{color:#b8653b;font-weight:900}
  </style>
</head>
<body>
  <iframe id="catalogFrame" src="index-supabase-final.html?v=20260621-phone-country-1" title="Catálogo Tu Dulce Día"></iframe>
  <main class="fallback" id="fallback"><section class="card"><h1>Tu Dulce Día</h1><p>No pudimos cargar el catálogo automáticamente.</p><p><a href="index-supabase-final.html">Abrir catálogo</a></p></section></main>
  <script>
    const frame=document.getElementById('catalogFrame');
    function patchWhatsapp(){
      try{
        const w=frame.contentWindow;
        if(!w||w.__tdWhatsappMixtoPatch)return;
        w.eval(`
          whatsappUrl = function(result,payload){
            const entregaMixta = payload.tipoPedido === 'Mixto'
              ? (payload.entregaSeparada ? 'Entrega: Separada (pan y galletas)' : 'Entrega: Todo junto')
              : '';
            const msg = [
              'Hola! Quiero confirmar mi pedido '+(result.folio||''),
              'Nombre: '+payload.nombreCliente,
              'Fecha: '+payload.fechaSolicitada,
              'Total: '+money.format(payload.totalEstimado),
              'Tipo: '+payload.tipoPedido
            ];
            if(entregaMixta) msg.push(entregaMixta);
            return 'https://api.whatsapp.com/send/?phone='+WA_NUMBER+'&text='+encodeURIComponent(msg.join('\\n'))+'&type=phone_number&app_absent=0';
          };
          window.__tdWhatsappMixtoPatch = true;
        `);
      }catch(e){}
    }
    function patchPhone(){
      try{
        const d=frame.contentDocument,w=frame.contentWindow;
        if(!d||!w||w.__tdPhoneCountryPatch)return;
        const phone=d.getElementById('phone');
        if(!phone)return;
        const label=phone.closest('label');
        if(!label)return;
        label.innerHTML='WhatsApp<div style="display:grid;grid-template-columns:140px 1fr;gap:8px"><select id="countryCode"><option value="56" selected>Chile +56</option><option value="54">Argentina +54</option><option value="51">Perú +51</option><option value="591">Bolivia +591</option><option value="57">Colombia +57</option><option value="58">Venezuela +58</option><option value="55">Brasil +55</option><option value="52">México +52</option><option value="1">EE.UU./Canadá +1</option><option value="34">España +34</option><option value="">Otro</option></select><input id="phone" inputmode="tel" placeholder="9 1234 5678"></div>';
        const oldBuild=w.buildPayload;
        w.buildPayload=function(){
          const payload=oldBuild();
          const cc=d.getElementById('countryCode')?.value||'';
          const raw=(d.getElementById('phone')?.value||'').replace(/[^0-9]/g,'');
          payload.telefonoCliente = cc ? ('+'+cc+raw) : raw;
          return payload;
        };
        w.__tdPhoneCountryPatch=true;
      }catch(e){}
    }
    function polish(){
      try{
        const d=frame.contentDocument;
        if(!d)return;
        patchWhatsapp();
        patchPhone();
        const lead=d.querySelector('section.card .lead');
        if(lead&&!d.getElementById('tdAnticipacionLead')){
          const p=d.createElement('p');
          p.id='tdAnticipacionLead';
          p.className='lead';
          p.textContent='Pedidos con anticipación: galletas 24 hrs · pan 72 hrs.';
          lead.insertAdjacentElement('afterend',p);
        }
        const status=d.getElementById('status');
        if(status&&/^OK:\s*/.test(status.textContent))status.textContent=status.textContent.replace(/^OK:\s*/, '');
        const hint=d.getElementById('ruleHint');
        if(hint&&hint.textContent.trim()==='Selecciona productos.')hint.textContent='Selecciona productos para calcular el total.';
        d.querySelectorAll('button').forEach(btn=>{
          if(btn.textContent.trim()==='Agregar')btn.textContent='Agregar al pedido';
        });
      }catch(e){}
    }
    frame.addEventListener('load',()=>{
      polish();
      try{new MutationObserver(polish).observe(frame.contentDocument.body,{childList:true,subtree:true,characterData:true});}catch(e){}
      setInterval(polish,800);
    });
    setTimeout(()=>{try{if(!frame.contentDocument)document.getElementById('fallback').style.display='grid'}catch(e){}},5000);
  </script>
</body>
</html>
