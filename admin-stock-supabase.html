<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Stock Supabase</title><style>body{font-family:system-ui;margin:0;background:#fff8ec;color:#563820}.wrap{width:min(850px,calc(100% - 24px));margin:auto;padding:24px}.card{background:#fffdf8;border:1px solid #ead8bd;border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 12px 28px #56382022}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select,textarea{width:100%;padding:10px;border:1px solid #dec6a3;border-radius:12px;background:#fffdf8;font:inherit}label{display:block;margin:10px 0;font-weight:800}button,a{border:0;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;display:inline-block}.primary{background:#b8653b;color:white}.link{background:#f1dfc8;color:#563820}.msg{padding:12px;border-radius:14px;background:#eaf7ed;color:#48663f;font-weight:900}.err{background:#fff0ed;color:#9f3d31}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Movimientos de stock</h1><p>Entrada, salida, ajuste o merma manual de insumos.</p><a class="link" href="panel-td-privado-2026.html">Panel</a> <a class="link" href="admin-backoffice-supabase.html">Backoffice</a></section><section class="card"><label>Clave interna<input id="pin" type="password"></label><button class="link" onclick="cargar()">Cargar insumos</button><div class="grid"><label>Insumo<select id="insumo"></select></label><label>Fecha<input id="fecha" type="date"></label><label>Tipo<select id="tipo"><option>entrada</option><option>salida</option><option>ajuste</option><option>merma</option></select></label><label>Cantidad<input id="cantidad" type="number" step="0.001"></label><label>Unidad<select id="unidad"><option>g</option><option>kg</option><option>ml</option><option>l</option><option>unidad</option><option>pack</option><option>servicio</option></select></label><label>Costo total<input id="costo" type="number" value="0"></label></div><label>Observación<textarea id="obs"></textarea></label><button class="primary" onclick="guardar()">Guardar movimiento</button><div id="msg" class="msg" style="margin-top:12px">Carga insumos para comenzar.</div></section></main><script>const U='https://uhwaybppsyibiwvqyglr.supabase.co';let K='',S={insumos:[]};const $=id=>document.getElementById(id);$('pin').value=sessionStorage.td_supabase_admin_token||'';function msg(t,e){$('msg').textContent=t;$('msg').className='msg '+(e?'err':'')}async function key(){if(K)return K;let h=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());let m=h.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!m)throw Error('No se pudo cargar clave pública');K=m[1];return K}async function rpc(fn,p){let k=await key();let r=await fetch(U+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify(p)});let t=await r.text();if(!r.ok)throw Error(t);return t?JSON.parse(t):null}function render(){document.getElementById('insumo').innerHTML='<option value=""></option>'+S.insumos.map(i=>'<option value="'+i.id+'">'+i.nombre+' ('+i.unidad_base+')</option>').join('')}async function cargar(){try{sessionStorage.td_supabase_admin_token=$('pin').value;S=await rpc('admin_backoffice_snapshot',{p_token:$('pin').value});render();msg('Insumos cargados.')}catch(e){msg(e.message,true)}}async function guardar(){try{await rpc('admin_registrar_stock_movimiento',{p_token:$('pin').value,p_insumo_id:$('insumo').value,p_fecha:$('fecha').value,p_tipo:$('tipo').value,p_cantidad_base:+$('cantidad').value,p_unidad_base:$('unidad').value,p_costo_total:+$('costo').value||0,p_observacion:$('obs').value});msg('Movimiento guardado correctamente.')}catch(e){msg(e.message,true)}}if($('pin').value)cargar();</script></body></html>
