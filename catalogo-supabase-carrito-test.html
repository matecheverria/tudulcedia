<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Tu Dulce Día | Carrito Supabase Test</title>
  <style>
    :root{--bg:#fff8ec;--card:#fffdf8;--ink:#563820;--muted:#7d5b3f;--line:#ead8bd;--accent:#b8653b;--green:#48663f;--bad:#9f3d31;--ok:#166534;--shadow:#56382022}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.45}.wrap{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:28px 0 80px}h1{font-size:clamp(1.8rem,4vw,3rem);margin:0 0 8px}.lead{margin:0 0 16px;color:var(--muted);font-weight:800}.notice{background:#fff3df;border:1px solid var(--line);border-radius:18px;padding:13px 15px;margin:14px 0;font-weight:900}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;align-items:start}.box{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 14px 34px var(--shadow)}.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.product{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;display:grid;gap:9px}.product.selected{border-color:var(--accent);box-shadow:0 12px 28px #b8653b24}.product h3{margin:0;font-size:1.03rem}.desc{margin:0;color:var(--muted);font-size:.9rem}.price{font-size:1.35rem;font-weight:1000;color:#d18491}.code{font-size:.78rem;color:var(--muted);font-weight:850}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.qty{width:78px;border:1px solid var(--line);border-radius:12px;padding:10px;font-weight:900;color:var(--ink)}button,a.btn{border:0;border-radius:999px;padding:11px 14px;font-weight:1000;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.primary{background:var(--accent);color:#fff}.secondary{background:#f1dfc8;color:var(--ink)}.green{background:var(--green);color:#fff}.summary{display:grid;gap:9px}.item{border-bottom:1px dashed var(--line);padding-bottom:9px}.item strong{display:block}.item span{color:var(--muted);font-weight:800}.total{font-size:1.5rem;font-weight:1000;color:var(--accent);margin-top:8px}.msg{border-radius:14px;padding:12px 14px;font-weight:900;margin:12px 0}.ok{background:#eaf7ed;color:var(--ok);border:1px solid #bfe7ca}.err{background:#fff0ed;color:var(--bad);border:1px solid #f1c1b8}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.actions>*{flex:1;min-width:170px}@media(max-width:820px){.grid{grid-template-columns:1fr}.box{padding:14px}.products{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Carrito Supabase Test</h1>
    <p class="lead">Prueba de productos desde Supabase + carrito local. No registra pedidos todavía.</p>
    <div class="notice">Fase segura: aquí solo probamos selección, cantidades y total. El catálogo productivo sigue intacto.</div>
    <div class="grid">
      <section class="box">
        <h2>Productos activos</h2>
        <div id="status" class="msg">Cargando productos...</div>
        <div id="products" class="products"></div>
      </section>
      <aside class="box">
        <h2>Carrito</h2>
        <div id="summary" class="summary"></div>
        <div class="actions">
          <a class="btn secondary" href="index-supabase-test.html">Volver fase 2</a>
          <a class="btn green" href="./">Catálogo productivo</a>
        </div>
      </aside>
    </div>
  </main>
  <script>
    const SUPABASE_URL='https://uhwaybppsyibiwvqyglr.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVod2F5YnBwc3lpYml3dnF5Z2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDYzNTQsImV4cCI6MjA5NzU4MjM1NH0.wX6mcThTf38kSuMYP-wfhRnafbzdMqS-uOc8wZXdmkM';
    const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
    const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
    let catalog=[];
    function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    async function load(){
      const url=SUPABASE_URL+'/rest/v1/productos?select=codigo,nombre,categoria,precio,descripcion,orden,activo&activo=eq.true&order=orden.asc';
      const r=await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY}});
      if(!r.ok) throw new Error(await r.text());
      return r.json();
    }
    function renderProducts(){
      $('#products').innerHTML=catalog.map(p=>`<article class="product" data-code="${esc(p.codigo)}"><h3>${esc(p.nombre)}</h3><p class="desc">${esc(p.descripcion||'')}</p><div class="price">${money.format(p.precio)}</div><div class="code">${esc(p.codigo)}</div><div class="row"><input class="qty" type="number" min="1" value="1"><button class="secondary" type="button">Agregar</button></div></article>`).join('');
      $$('.product').forEach(card=>{const btn=card.querySelector('button');const qty=card.querySelector('.qty');btn.onclick=()=>{card.classList.toggle('selected');btn.textContent=card.classList.contains('selected')?'Quitar':'Agregar';btn.className=card.classList.contains('selected')?'green':'secondary';renderSummary()};qty.oninput=renderSummary});
      renderSummary();
    }
    function selected(){return $$('.product.selected').map(card=>{const p=catalog.find(x=>x.codigo===card.dataset.code);const q=Math.max(1,parseInt(card.querySelector('.qty').value||'1',10)||1);return {...p,cantidad:q,subtotal:(Number(p.precio)||0)*q}})}
    function renderSummary(){const items=selected();const total=items.reduce((s,p)=>s+p.subtotal,0);$('#summary').innerHTML=items.length?items.map(p=>`<div class="item"><strong>${esc(p.nombre)} x ${p.cantidad}</strong><span>${money.format(p.precio)} c/u · ${money.format(p.subtotal)}</span></div>`).join('')+`<div class="total">Total: ${money.format(total)}</div>`:'<p style="color:var(--muted);font-weight:850">Selecciona productos para ver el total.</p>'}
    load().then(data=>{catalog=data;$('#status').className='msg ok';$('#status').textContent='OK: '+data.length+' productos activos cargados desde Supabase.';renderProducts()}).catch(e=>{$('#status').className='msg err';$('#status').textContent='Error leyendo Supabase: '+(e.message||e)});
  </script>
</body>
</html>
