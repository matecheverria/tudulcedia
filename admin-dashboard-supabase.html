<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Dashboard Supabase | Tu Dulce Día</title>
<style>
:root{--bg:#fff8ec;--card:#fffdf8;--line:#ead8bd;--text:#563820;--muted:#7d5b3f;--acc:#b8653b;--ok:#48663f;--bad:#9f3d31;--info:#315d88;--warn:#8f492b;--shadow:#56382022}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg),#f3e4cb);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1500px,calc(100% - 28px));margin:auto;padding:22px 0 70px}.card{background:#ffffffdd;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 14px 34px var(--shadow);margin:12px 0}h1{margin:0;font-size:clamp(1.8rem,4vw,2.6rem)}h2{margin:.1em 0}.muted{color:var(--muted);font-weight:800}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap}a,button{border:0;border-radius:999px;padding:10px 13px;text-decoration:none;font-weight:950;cursor:pointer;font:inherit;display:inline-flex;align-items:center;justify-content:center}.primary{background:var(--acc);color:#fff}.secondary{background:#f1dfc8;color:var(--text)}.green{background:var(--ok);color:#fff}.grid{display:grid;gap:10px}.filters{grid-template-columns:1.5fr repeat(4,1fr)}.kpis{grid-template-columns:repeat(5,1fr)}.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px}.kpi strong{display:block;font-size:1.45rem}.kpi span{font-size:.82rem;color:var(--muted);font-weight:950}label{font-weight:950;display:grid;gap:5px}input,select{width:100%;border:1px solid #dec6a3;border-radius:12px;padding:10px;background:#fffdf8;color:var(--text);font:inherit;font-weight:750}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:.76rem;font-weight:950;background:#f1dfc8;white-space:nowrap}.ok{background:#e9f4e6;color:var(--ok)}.bad{background:#fde7e2;color:var(--bad)}.info{background:#e7f0f8;color:var(--info)}.warn{background:#fff2df;color:var(--warn)}.scroll{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fffdf8}table{width:100%;border-collapse:collapse;min-width:1260px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top;font-size:.82rem}th{position:sticky;top:0;background:#f4dfc4;text-transform:uppercase;font-size:.7rem;z-index:1}.products{white-space:pre-line;max-height:84px;overflow:auto}.note{white-space:pre-line;color:#6c4b34;font-size:.78rem;max-height:80px;overflow:auto}.msg{border-radius:14px;padding:12px;font-weight:900}.err{background:#fff0ed;color:var(--bad);border:1px solid #f1c1b8}.good{background:#eaf7ed;color:var(--ok);border:1px solid #bfe7ca}.empty{text-align:center;padding:24px;font-weight:900;color:var(--muted)}@media(max-width:900px){.top{display:block}.filters,.kpis{grid-template-columns:1fr}.actions a,.actions button{width:100%;margin-top:6px}.wrap{width:calc(100% - 18px)}}
</style>
</head>
<body>
<main class="wrap">
<section class="card top">
  <div><h1>Dashboard Supabase</h1><p class="muted">Vista mínima paralela. Lee desde Supabase y no reemplaza aún el dashboard actual.</p></div>
  <div class="actions"><a class="secondary" href="admin-dashboard.html">Dashboard actual</a><a class="secondary" href="catalogo-supabase.html">Catálogo Supabase</a><button class="primary" id="reload">Refrescar</button></div>
</section>
<section class="grid kpis" id="kpis"></section>
<section class="card">
  <div class="grid filters">
    <label>Buscar<input id="q" placeholder="folio, cliente, producto, nota..."></label>
    <label>Origen<select id="origin"><option value="">Todos</option></select></label>
    <label>Tipo<select id="type"><option value="">Todos</option><option>Galletas</option><option>Pan</option><option>Mixto</option><option>Otro</option></select></label>
    <label>Estado<select id="state"><option value="">Todos</option></select></label>
    <label>Pago<select id="pay"><option value="">Todos</option></select></label>
  </div>
  <div class="actions" style="margin-top:12px"><button class="secondary" id="clear">Limpiar filtros</button><button class="green" id="csv">Exportar CSV</button></div>
</section>
<section class="card">
  <div class="top"><div><h2>Pedidos Supabase</h2><p class="muted" id="count">Cargando...</p></div></div>
  <div id="status" class="msg good">Conectando con Supabase...</div>
  <div class="scroll" style="margin-top:12px"><table><thead><tr><th>Folio</th><th>Origen</th><th>Tipo</th><th>Cliente</th><th>Fecha</th><th>Productos</th><th>Total</th><th>Estado</th><th>Pago</th><th>Nota entrega</th></tr></thead><tbody id="tbody"></tbody></table></div>
</section>
</main>
<script>
const SUPABASE_URL='https://uhwaybppsyibiwvqyglr.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6InVod2F5YnBwc3lpYml3dnF5Z2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDYzNTQsImV4cCI6MjA5NzU4MjM1NH0.wX6mcThTf38kSuMYP-wfhRnafbzdMqS-uOc8wZXdmkM';
const $=s=>document.querySelector(s);const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
let rows=[];const el={q:$('#q'),origin:$('#origin'),type:$('#type'),state:$('#state'),pay:$('#pay'),tbody:$('#tbody'),status:$('#status'),count:$('#count'),kpis:$('#kpis')};
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function norm(v){return String(v??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function csvCell(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function fillSelect(sel,vals){const current=sel.value;sel.innerHTML='<option value="">Todos</option>'+Array.from(new Set(vals.filter(Boolean))).sort().map(v=>`<option>${esc(v)}</option>`).join('');sel.value=current}
async function load(){el.status.className='msg good';el.status.textContent='Cargando pedidos desde Supabase...';el.tbody.innerHTML='';try{const url=SUPABASE_URL+'/rest/v1/v_pedidos_operativos?select=*&order=creado_en.desc&limit=500';const r=await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY}});if(!r.ok)throw new Error(await r.text());rows=await r.json();fillSelect(el.origin,rows.map(x=>x.origen));fillSelect(el.state,rows.map(x=>x.estado));fillSelect(el.pay,rows.map(x=>x.estado_pago));el.status.textContent='OK: '+rows.length+' pedidos cargados.';render()}catch(e){el.status.className='msg err';el.status.textContent='Error leyendo Supabase: '+(e.message||e);el.tbody.innerHTML='<tr><td colspan="10"><div class="empty">No se pudo cargar la vista v_pedidos_operativos. Revisa que el SQL de vistas esté ejecutado y tenga permisos.</div></td></tr>'}}
function filtered(){const q=norm(el.q.value);return rows.filter(o=>{const text=norm([o.folio,o.cliente_nombre,o.cliente_telefono,o.productos_texto,o.origen,o.tipo_pedido,o.estado,o.estado_pago,o.nota_entrega,o.observacion,o.observacion_interna].join(' '));return(!q||text.includes(q))&&(!el.origin.value||o.origen===el.origin.value)&&(!el.type.value||o.tipo_pedido===el.type.value)&&(!el.state.value||o.estado===el.state.value)&&(!el.pay.value||o.estado_pago===el.pay.value)})}
function render(){const data=filtered();const activos=data.filter(x=>x.estado!=='Cancelado');const anulados=data.length-activos.length;const ingreso=activos.reduce((s,x)=>s+(Number(x.total_considerado)||0),0);el.kpis.innerHTML=`<div class="kpi"><strong>${activos.length}</strong><span>Pedidos activos</span></div><div class="kpi"><strong>${money.format(ingreso)}</strong><span>Ingreso activo</span></div><div class="kpi"><strong>${anulados}</strong><span>Anulados</span></div><div class="kpi"><strong>${data.filter(x=>x.tipo_pedido==='Mixto').length}</strong><span>Mixtos</span></div><div class="kpi"><strong>${rows.length}</strong><span>Total leídos</span></div>`;el.count.textContent=`${data.length} resultado(s), ${activos.length} activo(s)`;el.tbody.innerHTML=data.length?data.map(row).join(''):'<tr><td colspan="10"><div class="empty">Sin resultados.</div></td></tr>'}
function row(o){return `<tr><td><strong>${esc(o.folio)}</strong><br><span class="muted">${esc((o.creado_en||'').slice(0,10))}</span></td><td><span class="pill info">${esc(o.origen)}</span></td><td><span class="pill ${o.tipo_pedido==='Mixto'?'warn':'ok'}">${esc(o.tipo_pedido)}</span></td><td><strong>${esc(o.cliente_nombre)}</strong><br>${esc(o.cliente_telefono||'')}</td><td>${esc(o.fecha_solicitada)}</td><td><div class="products">${esc(o.productos_texto||'')}</div></td><td><strong>${money.format(Number(o.total_considerado)||0)}</strong>${o.estado==='Cancelado'?'<br><span class="pill bad">No suma</span>':''}</td><td><span class="pill ${o.estado==='Cancelado'?'bad':'ok'}">${esc(o.estado_operativo||o.estado)}</span></td><td>${esc(o.estado_pago)}</td><td><div class="note">${esc([o.nota_entrega,o.entrega_separada?'Entrega separada: sí':'',o.observacion].filter(Boolean).join('\n')||'—')}</div></td></tr>`}
function exportCsv(){const data=filtered();const cols=['folio','origen','tipo_pedido','cliente_nombre','cliente_telefono','fecha_solicitada','productos_texto','total_estimado','total_considerado','estado','estado_pago','estado_operativo','nota_entrega','entrega_separada','observacion'];const csv=[cols.join(',')].concat(data.map(o=>cols.map(c=>csvCell(o[c])).join(','))).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pedidos-supabase-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href)}
[el.q,el.origin,el.type,el.state,el.pay].forEach(x=>{x.addEventListener('input',render);x.addEventListener('change',render)});$('#reload').onclick=load;$('#clear').onclick=()=>{el.q.value='';el.origin.value='';el.type.value='';el.state.value='';el.pay.value='';render()};$('#csv').onclick=exportCsv;load();
</script>
</body>
</html>
