<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Recetas avanzadas</title><style>body{font-family:system-ui;margin:0;background:#fff8ec;color:#563820}.wrap{max-width:900px;margin:auto;padding:24px}.card{background:#fffdf8;border:1px solid #ead8bd;border-radius:22px;padding:18px;margin:12px 0}label{display:block;margin:10px 0;font-weight:800}input,select{width:100%;padding:10px;border:1px solid #dec6a3;border-radius:12px}.row{display:grid;grid-template-columns:1fr .5fr .5fr auto;gap:8px;margin:8px 0}.btn,a{border:0;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;display:inline-block}.pri{background:#b8653b;color:#fff}.sec{background:#f1dfc8;color:#563820}.del{background:#fde7e2;color:#9f3d31}.msg{padding:12px;border-radius:14px;background:#eaf7ed;color:#48663f;font-weight:900}@media(max-width:760px){.row{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Recetas avanzadas</h1><p>Editar ingredientes existentes de una receta.</p><a class="btn sec" href="panel-td-privado-2026.html">Panel</a> <a class="btn sec" href="admin-backoffice-supabase.html">Backoffice</a></section><section class="card"><label>Clave<input id="pin" type="password"></label><button class="btn sec" onclick="cargar()">Cargar</button><label>Receta<select id="receta" onchange="ver()"></select></label><div id="rows"></div><button class="btn sec" onclick="fila()">Agregar</button> <button class="btn pri" onclick="guardar()">Guardar</button><div id="msg" class="msg">Listo.</div></section></main><script>const U='https://uhwaybppsyibiwvqyglr.supabase.co';let K='',D={insumos:[],recetas:[],ingredientes:[]};const $=x=>document.getElementById(x);pin.value=sessionStorage.td_supabase_admin_token||'';async function key(){if(K)return K;let h=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());K=h.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/)[1];return K}async function rpc(f,p){let k=await key();let r=await fetch(U+'/rest/v1/rpc/'+f,{method:'POST',headers:{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify(p)});let t=await r.text();if(!r.ok)throw Error(t);return t?JSON.parse(t):null}function m(t){msg.textContent=t}function opts(a){return '<option value=""></option>'+a.map(x=>'<option value="'+x.id+'">'+(x.nombre||x.producto_nombre)+'</option>').join('')}async function cargar(){try{sessionStorage.td_supabase_admin_token=pin.value;D=await rpc('admin_backoffice_snapshot',{p_token:pin.value});receta.innerHTML=opts(D.recetas);m('Datos cargados')}catch(e){m(e.message)}}function fila(v={}){let d=document.createElement('div');d.className='row';d.innerHTML='<select class="ins">'+opts(D.insumos)+'</select><input class="cant" type="number" step="0.001"><select class="uni"><option>g</option><option>kg</option><option>ml</option><option>l</option><option>unidad</option><option>pack</option><option>servicio</option></select><button class="btn del" type="button">Quitar</button>';d.querySelector('.ins').value=v.insumo_id||'';d.querySelector('.cant').value=v.cantidad||'';d.querySelector('.uni').value=v.unidad||'g';d.querySelector('button').onclick=()=>d.remove();rows.appendChild(d)}function ver(){rows.innerHTML='';D.ingredientes.filter(x=>x.receta_id===receta.value).forEach(fila);m('Ingredientes actuales cargados')}async function guardar(){try{let arr=[...rows.querySelectorAll('.row')].map(r=>({insumo_id:r.querySelector('.ins').value,cantidad:+r.querySelector('.cant').value,unidad:r.querySelector('.uni').value})).filter(x=>x.insumo_id&&x.cantidad>0);await rpc('admin_reemplazar_ingredientes_receta',{p_token:pin.value,p_receta_id:receta.value,p_ingredientes:arr});m('Guardado correctamente');await cargar();ver()}catch(e){m(e.message)}}if(pin.value)cargar();</script></body></html>
