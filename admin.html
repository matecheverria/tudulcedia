<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | Tu Dulcedía</title>
  <meta name="description" content="Panel privado de administración de pedidos Tu Dulcedía.">
  <style>
    :root{
      --crema:#fff8ec;
      --beige:#f3e4cb;
      --cafe:#563820;
      --cafe2:#7d5b3f;
      --terracota:#b8653b;
      --terracota2:#8f492b;
      --verde:#48663f;
      --rojo:#9f3d31;
      --azul:#315d88;
      --gris:#74685e;
      --sombra:0 18px 45px rgba(86,56,32,.14);
      --radio:22px;
      --max:1180px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--cafe);background:radial-gradient(circle at top left,rgba(184,101,59,.18),transparent 32rem),linear-gradient(180deg,var(--crema),#fffdf8 45%,var(--beige));line-height:1.5}
    .contenedor{width:min(100% - 28px,var(--max));margin:auto}
    header{padding:26px 0 16px}
    .hero,.card,.pedido,.toolbar,.login{background:rgba(255,255,255,.86);border:1px solid rgba(86,56,32,.12);border-radius:30px;box-shadow:var(--sombra);backdrop-filter:blur(10px)}
    .hero{padding:24px;display:flex;justify-content:space-between;gap:18px;align-items:center}
    h1,h2,h3,p{margin-top:0}
    h1{font-size:clamp(1.8rem,5vw,3.2rem);line-height:1;letter-spacing:-.05em;margin:8px 0;color:#442916}
    .muted{color:var(--cafe2)}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#f1dfc8;color:var(--cafe2);font-weight:900;font-size:.84rem}
    .pill.ok{background:#e9f4e6;color:var(--verde)}
    .pill.warn{background:#fff2df;color:var(--terracota2)}
    .pill.danger{background:#fde7e2;color:var(--rojo)}
    .pill.info{background:#e7f0f8;color:var(--azul)}
    .acciones{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a,button{font:inherit}
    button,.btn{border:0;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
    button:hover:not(:disabled),.btn:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed}
    .btn-principal{background:var(--terracota);color:#fff;box-shadow:0 12px 24px rgba(184,101,59,.22)}
    .btn-secundario{background:#f1dfc8;color:var(--cafe)}
    .btn-verde{background:var(--verde);color:#fff}
    .btn-rojo{background:#fde7e2;color:var(--rojo)}
    .login,.toolbar,.card{padding:18px;margin:18px 0}
    .login-grid{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}
    label{font-weight:900;color:#442916}
    input,select{width:100%;border:1px solid rgba(86,56,32,.18);border-radius:16px;padding:12px 13px;font:inherit;color:var(--cafe);background:#fffdf8;outline:none}
    input:focus,select:focus{border-color:rgba(184,101,59,.72);box-shadow:0 0 0 4px rgba(184,101,59,.12)}
    .campo{display:grid;gap:7px}
    .mensaje{display:none;margin-top:12px;padding:13px 14px;border-radius:16px;font-weight:850}
    .mensaje.visible{display:block}
    .mensaje.ok{background:#e9f4e6;color:var(--verde);border:1px solid rgba(72,102,63,.2)}
    .mensaje.error{background:#fde7e2;color:var(--rojo);border:1px solid rgba(159,61,49,.2)}
    .metricas{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
    .metrica{padding:16px;border-radius:22px;background:rgba(255,255,255,.86);border:1px solid rgba(86,56,32,.1);box-shadow:0 10px 25px rgba(86,56,32,.07)}
    .metrica strong{display:block;font-size:1.7rem;line-height:1;color:#442916}
    .metrica span{color:var(--cafe2);font-weight:800;font-size:.9rem}
    .filtros{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:10px;align-items:end}
    .lista{display:grid;gap:14px;margin:18px 0 34px}
    .pedido{padding:16px}
    .pedido-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .pedido h3{margin:0;font-size:1.1rem;line-height:1.2;color:#442916}
    .pedido .sub{color:var(--cafe2);font-weight:750;font-size:.92rem}
    .pedido-grid{display:grid;grid-template-columns:1.3fr .8fr .8fr;gap:12px;align-items:start}
    .bloque{padding:12px;border-radius:17px;background:#fffaf1;border:1px solid rgba(86,56,32,.09)}
    .bloque strong{display:block;margin-bottom:4px;color:#442916}
    .productos{font-size:.92rem;color:#62432d}
    .selectores{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .quick button{padding:9px 11px;font-size:.86rem;background:#f1dfc8;color:var(--cafe);box-shadow:none}
    .quick button.ok{background:#e9f4e6;color:var(--verde)}
    .quick button.warn{background:#fff2df;color:var(--terracota2)}
    .quick button.danger{background:#fde7e2;color:var(--rojo)}
    .pedido-footer{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;border-top:1px solid rgba(86,56,32,.11);padding-top:12px}
    .empty{padding:28px;text-align:center;color:var(--cafe2);font-weight:850;background:rgba(255,255,255,.72);border:1px dashed rgba(86,56,32,.2);border-radius:22px}
    .whatsapp{background:#e9f4e6;color:var(--verde)}
    .copiar{background:#e7f0f8;color:var(--azul)}
    footer{text-align:center;color:var(--cafe2);padding:30px 0 44px}
    @media(max-width:900px){.hero{align-items:flex-start;flex-direction:column}.metricas{grid-template-columns:repeat(2,1fr)}.filtros,.pedido-grid,.selectores{grid-template-columns:1fr}.login-grid{grid-template-columns:1fr}.acciones a,.acciones button,.login button{width:100%}.pedido-top{flex-direction:column}}
    @media(max-width:520px){.contenedor{width:min(100% - 20px,var(--max))}.metricas{grid-template-columns:1fr}.pedido-footer button,.pedido-footer a{width:100%}}
  </style>
</head>
<body>
  <header><div class="contenedor"><section class="hero"><div><span class="pill info">🔐 Panel privado</span><h1>Admin Tu Dulcedía</h1><p class="muted">Histórico de pedidos, control de estado y seguimiento de pago.</p></div><div class="acciones"><a class="btn btn-secundario" href="./">← Catálogo</a><button class="btn-rojo" type="button" id="btnOlvidarClave">Olvidar clave</button></div></section></div></header>

  <main class="contenedor">
    <section class="login">
      <div class="login-grid">
        <div class="campo"><label for="claveAdmin">Clave admin</label><input id="claveAdmin" type="password" autocomplete="off" placeholder="Ingresa tu clave privada"></div>
        <button class="btn-principal" type="button" id="btnCargar">Cargar pedidos</button>
        <button class="btn-secundario" type="button" id="btnRefrescar">Refrescar</button>
      </div>
      <div id="mensaje" class="mensaje" role="status" aria-live="polite"></div>
    </section>

    <section class="metricas" id="metricas">
      <div class="metrica"><strong>0</strong><span>Pedidos cargados</span></div>
      <div class="metrica"><strong>$0</strong><span>Total estimado</span></div>
      <div class="metrica"><strong>0</strong><span>Pendientes</span></div>
      <div class="metrica"><strong>0</strong><span>Por cobrar</span></div>
    </section>

    <section class="toolbar">
      <div class="filtros">
        <div class="campo"><label for="busqueda">Buscar</label><input id="busqueda" type="search" placeholder="Folio, cliente, teléfono, producto..."></div>
        <div class="campo"><label for="filtroEstado">Estado pedido</label><select id="filtroEstado"><option value="">Todos</option></select></div>
        <div class="campo"><label for="filtroPago">Estado pago</label><select id="filtroPago"><option value="">Todos</option></select></div>
        <div class="campo"><label for="filtroOrden">Orden</label><select id="filtroOrden"><option value="recientes">Más recientes</option><option value="antiguos">Más antiguos</option><option value="mayorTotal">Mayor total</option><option value="menorTotal">Menor total</option></select></div>
      </div>
      <div class="acciones" style="margin-top:14px"><button class="btn-secundario" type="button" id="btnLimpiarFiltros">Limpiar filtros</button><button class="btn-verde" type="button" id="btnExportarCsv">Exportar CSV</button></div>
    </section>

    <section class="lista" id="listaPedidos"><div class="empty">Carga los pedidos para comenzar.</div></section>
  </main>

  <footer><div class="contenedor">Panel de uso interno. No compartas tu clave admin.</div></footer>

  <script>
    const URL_WEB_APP="https://script.google.com/macros/s/AKfycbzmPICimq95KQ4GLloWbgeoonhTWBjzUM7J7kMbz32r9qiooqzC_MY4e2IADroA8Rnl/exec";
    const ESTADOS_PEDIDO=["Pendiente","Confirmado","En preparación","Listo para retiro/entrega","Entregado","Cancelado"];
    const ESTADOS_PAGO=["Pendiente de comprobante","Comprobante recibido","Pagado","Pago al retirar"];
    const $=s=>document.querySelector(s);
    const claveAdmin=$("#claveAdmin"),btnCargar=$("#btnCargar"),btnRefrescar=$("#btnRefrescar"),btnOlvidarClave=$("#btnOlvidarClave"),mensaje=$("#mensaje"),listaPedidos=$("#listaPedidos"),metricas=$("#metricas"),busqueda=$("#busqueda"),filtroEstado=$("#filtroEstado"),filtroPago=$("#filtroPago"),filtroOrden=$("#filtroOrden"),btnLimpiarFiltros=$("#btnLimpiarFiltros"),btnExportarCsv=$("#btnExportarCsv");
    const formatoCLP=new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0});
    let pedidos=[];
    iniciar();
    function iniciar(){llenarSelect(filtroEstado,ESTADOS_PEDIDO);llenarSelect(filtroPago,ESTADOS_PAGO);claveAdmin.value=sessionStorage.getItem("td_admin_token")||"";btnCargar.addEventListener("click",cargarPedidos);btnRefrescar.addEventListener("click",cargarPedidos);btnOlvidarClave.addEventListener("click",olvidarClave);[busqueda,filtroEstado,filtroPago,filtroOrden].forEach(el=>el.addEventListener("input",render));btnLimpiarFiltros.addEventListener("click",limpiarFiltros);btnExportarCsv.addEventListener("click",exportarCsv);if(claveAdmin.value)cargarPedidos()}
    function llenarSelect(select,opciones){opciones.forEach(o=>{const opt=document.createElement("option");opt.value=o;opt.textContent=o;select.appendChild(opt)})}
    function obtenerToken(){const token=claveAdmin.value.trim();if(token)sessionStorage.setItem("td_admin_token",token);return token}
    function olvidarClave(){sessionStorage.removeItem("td_admin_token");claveAdmin.value="";pedidos=[];render();mostrarMensaje("Clave olvidada en este navegador.","ok")}
    function mostrarMensaje(texto,tipo){mensaje.textContent=texto;mensaje.className=`mensaje visible ${tipo}`}
    function jsonp(action,params={}){return new Promise((resolve,reject)=>{const callback="tdAdminCb_"+Date.now()+"_"+Math.random().toString(36).slice(2);const url=new URL(URL_WEB_APP);url.searchParams.set("action",action);url.searchParams.set("callback",callback);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));const script=document.createElement("script");const limpiar=()=>{delete window[callback];script.remove()};window[callback]=data=>{limpiar();resolve(data)};script.onerror=()=>{limpiar();reject(new Error("No se pudo conectar con Apps Script. Revisa que los endpoints admin estén publicados."))};script.src=url.toString();document.body.appendChild(script)})}
    async function cargarPedidos(){const token=obtenerToken();if(!token){mostrarMensaje("Ingresa la clave admin.","error");return}btnCargar.disabled=true;btnRefrescar.disabled=true;mostrarMensaje("Cargando pedidos...","ok");try{const data=await jsonp("adminListarPedidos",{token});if(!data.exito)throw new Error(data.mensaje||"No se pudieron cargar los pedidos.");pedidos=(data.pedidos||[]).map((p,i)=>({...p,_orden:i}));render();mostrarMensaje(`Pedidos cargados: ${pedidos.length}.`,"ok")}catch(error){mostrarMensaje(error.message,"error")}finally{btnCargar.disabled=false;btnRefrescar.disabled=false}}
    function pedidosFiltrados(){const q=normalizar(busqueda.value),estado=filtroEstado.value,pago=filtroPago.value;let r=pedidos.filter(p=>{const texto=normalizar([p.folioPedido,p.nombreCliente,p.telefonoCliente,p.productosTexto,p.metodoPago,p.estado,p.estadoPago,p.observacion].join(" "));return(!q||texto.includes(q))&&(!estado||p.estado===estado)&&(!pago||p.estadoPago===pago)});const orden=filtroOrden.value;r.sort((a,b)=>{if(orden==="antiguos")return b._orden-a._orden;if(orden==="mayorTotal")return numero(b.totalEstimado)-numero(a.totalEstimado);if(orden==="menorTotal")return numero(a.totalEstimado)-numero(b.totalEstimado);return a._orden-b._orden});return r}
    function render(){const r=pedidosFiltrados();renderMetricas(r);renderLista(r)}
    function renderMetricas(data){const total=data.reduce((s,p)=>s+numero(p.totalEstimado),0),pendientes=data.filter(p=>p.estado!=="Entregado"&&p.estado!=="Cancelado").length,porCobrar=data.filter(p=>p.estadoPago!=="Pagado"&&p.estadoPago!=="Pago al retirar").length;metricas.innerHTML=`<div class="metrica"><strong>${data.length}</strong><span>Pedidos visibles</span></div><div class="metrica"><strong>${formatoCLP.format(total)}</strong><span>Total estimado</span></div><div class="metrica"><strong>${pendientes}</strong><span>Pendientes operativos</span></div><div class="metrica"><strong>${porCobrar}</strong><span>Por cobrar</span></div>`}
    function renderLista(data){if(!pedidos.length){listaPedidos.innerHTML='<div class="empty">Carga los pedidos para comenzar.</div>';return}if(!data.length){listaPedidos.innerHTML='<div class="empty">No hay pedidos que coincidan con los filtros.</div>';return}listaPedidos.innerHTML=data.map(p=>cardPedido(p)).join("");listaPedidos.querySelectorAll("button[data-guardar]").forEach(btn=>btn.addEventListener("click",()=>guardarPedido(btn.dataset.guardar)));listaPedidos.querySelectorAll("button[data-quick]").forEach(btn=>btn.addEventListener("click",()=>quickUpdate(btn)));listaPedidos.querySelectorAll("button[data-copy]").forEach(btn=>btn.addEventListener("click",()=>copiarResumen(btn.dataset.copy)))}
    function cardPedido(p){const folio=esc(p.folioPedido),telefono=normalizarTelefono(p.telefonoCliente),wa=telefono?`https://wa.me/${telefono}?text=${encodeURIComponent(mensajeWhatsApp(p))}`:"";return `<article class="pedido" data-folio="${folio}"><div class="pedido-top"><div><h3>${folio} · ${esc(p.nombreCliente||"Sin nombre")}</h3><div class="sub">${esc(p.fechaSolicitada||"Sin fecha")} · ${esc(p.telefonoCliente||"Sin teléfono")}</div></div><div class="acciones"><span class="pill ${claseEstado(p.estado)}">${esc(p.estado||"Pendiente")}</span><span class="pill ${clasePago(p.estadoPago)}">${esc(p.estadoPago||"Sin pago")}</span><span class="pill">${formatoCLP.format(numero(p.totalEstimado))}</span></div></div><div class="pedido-grid"><div class="bloque"><strong>Productos</strong><div class="productos">${esc(p.productosTexto||"Sin detalle")}</div></div><div class="bloque"><strong>Pago</strong><div>${esc(p.metodoPago||"")}</div><div class="muted">${esc(p.requiereDatosTransferencia?"Requiere datos transferencia: "+p.requiereDatosTransferencia:"")}</div></div><div class="bloque"><strong>Entrega / observación</strong><div>${esc(p.tipoEntrega||"")}</div><div class="muted">${esc(p.observacion||"Sin observación")}</div></div></div><div class="selectores"><div class="campo"><label>Estado pedido</label><select data-campo="estado">${opciones(ESTADOS_PEDIDO,p.estado||"Pendiente")}</select></div><div class="campo"><label>Estado pago</label><select data-campo="estadoPago">${opciones(ESTADOS_PAGO,p.estadoPago||"")}</select></div></div><div class="quick"><button type="button" data-quick="confirmado" data-folio="${folio}" class="warn">Confirmado</button><button type="button" data-quick="preparacion" data-folio="${folio}" class="warn">En preparación</button><button type="button" data-quick="listo" data-folio="${folio}" class="ok">Listo</button><button type="button" data-quick="entregado" data-folio="${folio}" class="ok">Entregado</button><button type="button" data-quick="pagado" data-folio="${folio}" class="ok">Pagado</button><button type="button" data-quick="cancelado" data-folio="${folio}" class="danger">Cancelado</button></div><div class="pedido-footer"><div class="acciones">${wa?`<a class="btn whatsapp" href="${wa}" target="_blank" rel="noopener">WhatsApp</a>`:""}<button class="btn copiar" type="button" data-copy="${folio}">Copiar resumen</button></div><button class="btn-principal" type="button" data-guardar="${folio}">Guardar cambios</button></div></article>`}
    function opciones(lista,valor){return lista.map(o=>`<option value="${esc(o)}" ${o===valor?"selected":""}>${esc(o)}</option>`).join("")}
    async function guardarPedido(folio){const token=obtenerToken(),card=listaPedidos.querySelector(`[data-folio="${CSS.escape(folio)}"]`);if(!token||!card)return;const estado=card.querySelector('[data-campo="estado"]').value,estadoPago=card.querySelector('[data-campo="estadoPago"]').value;mostrarMensaje(`Guardando ${folio}...`,"ok");try{const data=await jsonp("adminActualizarPedido",{token,folio,estado,estadoPago});if(!data.exito)throw new Error(data.mensaje||"No se pudo actualizar el pedido.");const pedido=pedidos.find(p=>p.folioPedido===folio);if(pedido){pedido.estado=estado;pedido.estadoPago=estadoPago}render();mostrarMensaje(`${folio} actualizado correctamente.`,"ok")}catch(error){mostrarMensaje(error.message,"error")}}
    function quickUpdate(btn){const folio=btn.dataset.folio,card=listaPedidos.querySelector(`[data-folio="${CSS.escape(folio)}"]`);if(!card)return;const estado=card.querySelector('[data-campo="estado"]'),pago=card.querySelector('[data-campo="estadoPago"]');const accion=btn.dataset.quick;if(accion==="confirmado")estado.value="Confirmado";if(accion==="preparacion")estado.value="En preparación";if(accion==="listo")estado.value="Listo para retiro/entrega";if(accion==="entregado")estado.value="Entregado";if(accion==="cancelado")estado.value="Cancelado";if(accion==="pagado")pago.value="Pagado";guardarPedido(folio)}
    function copiarResumen(folio){const p=pedidos.find(x=>x.folioPedido===folio);if(!p)return;const texto=`Pedido ${p.folioPedido}\nCliente: ${p.nombreCliente}\nTeléfono: ${p.telefonoCliente}\nFecha: ${p.fechaSolicitada}\nProductos: ${p.productosTexto}\nTotal: ${formatoCLP.format(numero(p.totalEstimado))}\nEstado: ${p.estado}\nPago: ${p.estadoPago}`;navigator.clipboard.writeText(texto).then(()=>mostrarMensaje(`Resumen ${folio} copiado.`,"ok")).catch(()=>mostrarMensaje("No se pudo copiar el resumen.","error"))}
    function mensajeWhatsApp(p){return `Hola ${p.nombreCliente||""}, te escribimos por tu pedido ${p.folioPedido}. Estado actual: ${p.estado||"Pendiente"}. Total estimado: ${formatoCLP.format(numero(p.totalEstimado))}. Muchas gracias.`}
    function exportarCsv(){const data=pedidosFiltrados();if(!data.length){mostrarMensaje("No hay pedidos para exportar.","error");return}const cols=["folioPedido","fechaRegistro","nombreCliente","telefonoCliente","fechaSolicitada","productosTexto","totalEstimado","metodoPago","estadoPago","estado","observacion"];const csv=[cols.join(",")].concat(data.map(p=>cols.map(c=>csvCell(p[c])).join(","))).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`pedidos-tu-dulcedia-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href)}
    function limpiarFiltros(){busqueda.value="";filtroEstado.value="";filtroPago.value="";filtroOrden.value="recientes";render()}
    function claseEstado(e){if(e==="Entregado")return"ok";if(e==="Cancelado")return"danger";if(e==="Listo para retiro/entrega")return"info";if(e==="Confirmado"||e==="En preparación")return"warn";return""}
    function clasePago(e){if(e==="Pagado")return"ok";if(e==="Comprobante recibido")return"info";if(e==="Pendiente de comprobante")return"warn";return""}
    function normalizar(t){return String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
    function numero(v){return Number(String(v||0).replace(/[^0-9.-]/g,""))||0}
    function esc(t){const d=document.createElement("div");d.textContent=t==null?"":String(t);return d.innerHTML}
    function csvCell(v){const s=String(v==null?"":v).replace(/"/g,'""');return `"${s}"`}
    function normalizarTelefono(t){if(!t)return"";let x=String(t).replace(/\D/g,"");if(!x)return"";if(x.startsWith("56"))return x;if(x.startsWith("9")&&x.length===9)return"56"+x;if(x.startsWith("0"))x=x.replace(/^0+/,"");if(x.length>=8&&x.length<=9)return"56"+x;return x}
  </script>
</body>
</html>
